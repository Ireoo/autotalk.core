name: Release Build

on:
  push:
    branches:
      - main  # 当推送到 main 分支时触发

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: Set up MSVC (Windows)
      if: matrix.os == 'windows-latest'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git cmake

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake
    #     brew link --force cmake@3.29.2

    - name: Install CMake (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install cmake

    - name: 下载CUDA安装包
      run: |
        # 通过NVIDIA官方链接下载指定版本（以CUDA 12.4为例）
        $cudaUrl = "https://developer.download.nvidia.com/compute/cuda/12.4.0/local_installers/cuda_12.4.0_551.61_windows.exe"
        Invoke-WebRequest -Uri $cudaUrl -OutFile cuda_installer.exe

    - name: 静默安装CUDA Toolkit
      run: |
        # 执行静默安装（跳过驱动安装，仅安装工具包）
        Start-Process -Wait -FilePath .\cuda_installer.exe -ArgumentList @(
          "-s",
          "nvcc_12.4",
          "visual_studio_integration_12.4",
          "no_driver"  # 若需安装驱动则移除此行
        )

    - name: 配置环境变量
      run: |
        # 添加CUDA路径到系统PATH
        $cudaPath = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4\bin"
        echo "$cudaPath" >> $env:GITHUB_PATH
        # 设置CUDA_HOME变量
        echo "CUDA_HOME=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4" >> $env:GITHUB_ENV

    # - name: 验证安装
    #   run: |
    #     nvcc --version
    #     nvidia-smi  # 注：GitHub托管Runner无物理GPU，此命令可能报错

    - name: Build Project CPU (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        bash build.sh
        cd Release
        Compress-Archive -Path * -DestinationPath ../autotalk-windows-cpu.zip
        cd ..

    - name: Build Project GPU (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Remove-Item -Recurse -Force build, Release
        bash build.sh --gpu
        cd Release
        Compress-Archive -Path * -DestinationPath ../autotalk-windows-gpu.zip
        cd ..

    - name: Build Project (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        bash build.sh
        cd Release
        tar -czvf ../autotalk-linux.tar.gz .
        cd ..

    - name: Build Project (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        bash build.sh
        cd Release
        tar -czvf ../autotalk-macos.tar.gz .
        cd ..

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
        append_body: true
        files: |
          *.zip
          *.tar.gz
        generate_release_notes: true