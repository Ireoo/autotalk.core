name: CMake跨平台AutoTalk构建

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 安装CUDA
        uses: Jimver/cuda-toolkit@v0.2.12
        id: cuda-toolkit

      - name: 检查音频库
        run: |
          echo "为Windows配置音频库"
        shell: bash
      
      - name: 设置CMake
        uses: lukka/get-cmake@latest
      
      - name: CMake配置和构建
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=75 -DUSE_CUDA=ON -DGGML_CUDA=ON
          cmake --build . --config Release
        shell: bash
      
      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-cmake-windows
          path: |
            build/bin/**/*.exe
  
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 安装CUDA
        uses: Jimver/cuda-toolkit@v0.2.12
        id: cuda-toolkit
   
      - name: 安装音频库
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev portaudio19-dev libopenblas-dev
      
      - name: 设置CMake
        uses: lukka/get-cmake@latest
      
      - name: CMake配置和构建
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_CUDA_ARCHITECTURES=75 -DUSE_CUDA=ON -DGGML_CUDA=ON
          cmake --build . --config Release
      
      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-cmake-linux
          path: build/bin/*
          if-no-files-found: warn
  
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 安装音频库和Metal支持
        run: |
          brew install portaudio
          brew install llvm libomp
          echo "已安装Metal AI支持所需依赖"
      
      - name: 设置CMake
        uses: lukka/get-cmake@latest
      
      - name: 创建MacOS专用CMakeLists.txt
        run: |
          # 创建全新的MacOS专用CMakeLists.txt而不是修改原始文件
          cat > macos_cmakelists.txt << EOL
          cmake_minimum_required(VERSION 3.18)
          project(AutoTalkMetal LANGUAGES CXX)
          
          # 设置模块路径
          list(APPEND CMAKE_MODULE_PATH \${CMAKE_CURRENT_SOURCE_DIR}/cmake)
          
          # 设置C++标准
          set(CMAKE_CXX_STANDARD 14)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          
          # 设置输出目录
          set(CMAKE_RUNTIME_OUTPUT_DIRECTORY \${CMAKE_BINARY_DIR}/bin)
          
          # 添加whisper.cpp库路径
          add_subdirectory(whisper.cpp)
          include_directories(\${CMAKE_CURRENT_SOURCE_DIR}/whisper.cpp)
          include_directories(\${CMAKE_CURRENT_SOURCE_DIR}/whisper.cpp/include)
          
          # 禁用CUDA, 启用Metal
          option(GGML_CUDA "Enable CUDA for GPU acceleration" OFF)
          option(GGML_METAL "Enable Metal for GPU acceleration on macOS" ON)
          
          # 添加源文件
          add_executable(autotalk src/main.cpp src/audio_recorder.cpp)
          
          # 链接autotalk所需的库
          target_link_libraries(autotalk PRIVATE whisper)
          
          if(GGML_METAL)
              target_compile_definitions(autotalk PRIVATE GGML_USE_METAL)
              message(STATUS "启用Metal加速")
          endif()
          
          # 输出项目信息
          message(STATUS "========== AutoTalk Metal项目配置 ==========")
          message(STATUS "项目名称: \${PROJECT_NAME}")
          message(STATUS "CMake版本: \${CMAKE_VERSION}")
          message(STATUS "构建类型: \${CMAKE_BUILD_TYPE}")
          message(STATUS "Metal加速: \${GGML_METAL}")
          message(STATUS "=======================================")
          EOL
          
          # 备份原始CMakeLists.txt并使用新的文件
          cp CMakeLists.txt CMakeLists.txt.original
          cp macos_cmakelists.txt CMakeLists.txt
          
          # 显示最终的CMakeLists.txt
          echo "MacOS专用CMakeLists.txt内容:"
          cat CMakeLists.txt
      
      - name: CMake配置和构建
        run: |
          set -e  # 出错时立即退出
          
          mkdir -p build
          cd build
          
          # 设置LLVM环境变量
          export LLVM_PATH=$(brew --prefix llvm)
          export CC=$LLVM_PATH/bin/clang
          export CXX=$LLVM_PATH/bin/clang++
          export LDFLAGS="-L$LLVM_PATH/lib -Wl,-rpath,$LLVM_PATH/lib"
          export CPPFLAGS="-I$LLVM_PATH/include"
          
          echo "配置MacOS版本的AutoTalk (Metal版本)..."
          cmake .. -DCMAKE_BUILD_TYPE=Release || {
            echo "CMake配置失败:"
            cat CMakeFiles/CMakeError.log || echo "无法显示CMake错误日志"
            exit 1
          }
          
          echo "编译MacOS版本的AutoTalk (Metal版本)..."
          cmake --build . --config Release || {
            echo "构建失败"
            exit 1
          }
          
          echo "AutoTalk Metal版本编译完成!"
          
          # 恢复原始CMakeLists.txt
          cd ..
          cp CMakeLists.txt.original CMakeLists.txt
      
      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-cmake-macos
          path: build/bin/autotalk
          if-no-files-found: warn
  
  build-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 准备模型目录
        run: |
          mkdir -p models
          echo "准备下载whisper模型..."
          
          # 创建模型下载脚本
          cat > download_models.sh << EOL
          #!/bin/bash
          
          # 设置模型目录
          MODELS_DIR="./models"
          mkdir -p "\${MODELS_DIR}"
          
          # 下载小型中文模型示例 (仅作为示例，实际使用中可能需要更大的模型)
          echo "下载小型中文模型示例..."
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o "\${MODELS_DIR}/ggml-small.bin"
          
          echo "模型下载完成!"
          EOL
          
          chmod +x download_models.sh
          ./download_models.sh
      
      - name: 保存模型文件
        uses: actions/upload-artifact@v4
        with:
          name: whisper-models-cmake
          path: models/
  
  package-cmake-release:
    needs: [build-windows, build-linux, build-macos, build-models]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 下载所有编译产物
        uses: actions/download-artifact@v3
        with:
          path: cmake-binaries
      
      - name: 准备CMake发布包
        run: |
          mkdir -p cmake-release/windows
          mkdir -p cmake-release/linux
          mkdir -p cmake-release/macos
          mkdir -p cmake-release/models
          
          # 复制各平台文件
          cp -r cmake-binaries/autotalk-cmake-windows/* cmake-release/windows/ || echo "Windows构建可能不存在"
          cp -r cmake-binaries/autotalk-cmake-linux/* cmake-release/linux/ || echo "Linux构建可能不存在"
          cp -r cmake-binaries/autotalk-cmake-macos/* cmake-release/macos/ || echo "MacOS构建可能不存在"
          cp -r cmake-binaries/whisper-models-cmake/* cmake-release/models/ || echo "模型可能不存在"
          
          # 创建README
          cat > cmake-release/README.md << EOL
          # AutoTalk跨平台CMake构建版本
          
          此发布包含使用CMake为不同平台构建的AutoTalk语音识别程序：
          
          - Windows: windows/autotalk.exe (CUDA GPU加速版本)
          - Linux: linux/autotalk (CUDA GPU加速版本)
          - MacOS: macos/autotalk (Metal GPU加速版本)
          
          ## 使用方法
          
          1. 根据您的平台选择相应的可执行文件
          2. 运行命令: \`./autotalk ../models/ggml-small.bin\`
          
          ## 系统要求
          
          - Windows/Linux: 需要安装CUDA运行时环境以实现GPU加速
          - MacOS: 需要支持Metal的Apple GPU (Apple M系列芯片或较新的AMD GPU)
          
          ## GPU加速
          
          本版本针对不同平台提供了不同的GPU加速方案：
          - Windows/Linux: CUDA加速
          - MacOS: Metal加速
          
          ## CUDA测试程序
          
          CMake构建也会生成CUDA测试程序：
          - Windows: windows/simple_cuda_test.exe, windows/cuda_test.exe
          - Linux: linux/simple_cuda_test, linux/cuda_test
          - MacOS: 不适用（MacOS使用Metal而不是CUDA）
          EOL
      
      - name: 创建CMake发布压缩包
        run: |
          cd cmake-release
          zip -r ../autotalk-cmake-all-platforms.zip *
      
      - name: 上传CMake发布包
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-cmake-all-platforms
          path: autotalk-cmake-all-platforms.zip 