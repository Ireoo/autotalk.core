name: Docker容器构建AutoTalk

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 设置Docker
        uses: docker/setup-buildx-action@v1
      
      - name: 构建Linux Docker镜像
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./docker/linux/Dockerfile
          load: true
          tags: autotalk-linux:latest
      
      - name: 运行Docker容器构建AutoTalk
        run: |
          mkdir -p build_output/linux
          docker run --rm -v ${{ github.workspace }}/build_output/linux:/app/build_autotalk_gpu/bin autotalk-linux:latest
      
      - name: 保存可执行文件
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-linux-docker
          path: build_output/linux/autotalk

  build-windows-cuda:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 设置Docker
        uses: crazy-max/ghaction-setup-docker@v2
      
      - name: 构建Windows Docker镜像
        run: |
          docker build -t autotalk-windows -f docker/windows/Dockerfile .
        shell: pwsh
      
      - name: 运行Docker容器构建AutoTalk
        run: |
          mkdir -p build_output/windows
          docker run --rm -v ${PWD}/build_output/windows:C:\app\build_autotalk_gpu\bin\Release autotalk-windows
        shell: pwsh
      
      - name: 保存可执行文件
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-windows-docker
          path: build_output/windows/autotalk.exe
          if-no-files-found: warn

  build-macos-metal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 安装依赖
        run: |
          brew install docker portaudio llvm libomp
          colima start
      
      - name: 构建CPU版本(Docker)
        run: |
          docker build -t autotalk-macos -f docker/macos/Dockerfile .
          mkdir -p build_output/macos
          docker run --rm -v ${{ github.workspace }}/build_output/macos:/app/output/bin autotalk-macos
      
      - name: 构建Metal版本(本地)
        run: |
          chmod +x docker/macos/build_mac_metal.sh
          ./docker/macos/build_mac_metal.sh
          mkdir -p build_output/macos_metal
          cp output/bin/autotalk build_output/macos_metal/
      
      - name: 保存可执行文件
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-macos
          path: |
            build_output/macos/autotalk
            build_output/macos_metal/autotalk
          if-no-files-found: warn

  build-models:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: 安装基本依赖
        run: |
          apt-get update
          apt-get install -y curl wget unzip zip git
      
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: 下载Whisper模型
        run: |
          mkdir -p models
          
          # 下载小型中文模型
          curl -L "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin" -o models/ggml-small.bin
          
          echo "模型下载完成!"
      
      - name: 保存模型文件
        uses: actions/upload-artifact@v4
        with:
          name: whisper-models-docker
          path: models/

  package-docker-release:
    needs: [build-linux-cuda, build-windows-cuda, build-macos-metal, build-models]
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: 安装基本依赖
        run: |
          apt-get update
          apt-get install -y zip unzip
      
      - uses: actions/checkout@v3
      
      - name: 下载所有编译产物
        uses: actions/download-artifact@v3
        with:
          path: docker-binaries
      
      - name: 准备发布包
        run: |
          mkdir -p docker-release/windows
          mkdir -p docker-release/linux
          mkdir -p docker-release/macos
          mkdir -p docker-release/models
          
          # 复制各平台文件
          cp -r docker-binaries/autotalk-windows-docker/* docker-release/windows/ || echo "Windows构建可能不存在"
          cp -r docker-binaries/autotalk-linux-docker/* docker-release/linux/ || echo "Linux构建可能不存在"
          cp -r docker-binaries/autotalk-macos/* docker-release/macos/ || echo "macOS构建可能不存在"
          cp -r docker-binaries/whisper-models-docker/* docker-release/models/ || echo "模型可能不存在"
          
          # 创建README
          cat > docker-release/README.md << EOL
          # AutoTalk跨平台Docker构建版本
          
          此发布包含使用Docker容器环境为不同平台构建的AutoTalk语音识别程序：
          
          - Windows: windows/autotalk.exe (CUDA GPU加速)
          - Linux: linux/autotalk (CUDA GPU加速)
          - MacOS: macos/autotalk (Metal GPU加速)
          
          ## 使用方法
          
          1. 根据您的平台选择相应的可执行文件
          2. 运行命令: \`./autotalk ../models/ggml-small.bin\`
          
          ## 系统要求
          
          - Windows/Linux: 需要安装CUDA运行时环境以实现GPU加速
          - MacOS: 需要支持Metal的Apple GPU (Apple M系列芯片或较新的AMD GPU)
          
          ## Docker构建优势
          
          本版本使用Docker容器构建，提供以下优势：
          - 一致的构建环境
          - 减少依赖冲突
          - 更好的跨平台兼容性
          - 易于复现的构建过程
          EOL
      
      - name: 创建Docker构建发布包
        run: |
          cd docker-release
          zip -r ../autotalk-docker-builds.zip *
      
      - name: 上传Docker构建包
        uses: actions/upload-artifact@v4
        with:
          name: autotalk-docker-builds
          path: autotalk-docker-builds.zip 